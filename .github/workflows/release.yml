name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build and package
        run: |
          chmod +x release.sh TextPick/build-app.sh
          ./release.sh "${GITHUB_REF_NAME#v}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TextPick-*.zip
          generate_release_notes: true
